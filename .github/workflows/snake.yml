name: Generate Snake

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: isjiajia01
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publish snake
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/snake-output
          if git ls-remote --exit-code --heads origin output; then
            git worktree add /tmp/snake-output origin/output
          else
            git worktree add -B output /tmp/snake-output
          fi

          cp dist/github-contribution-grid-snake.svg /tmp/snake-output/
          cp dist/github-contribution-grid-snake-dark.svg /tmp/snake-output/

          cd /tmp/snake-output
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git commit -m "Update contribution snake" || exit 0
          git push origin HEAD:output
